<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반려동물 정보</title>

<style>
body {
    margin:0;
    font-family: 'Pretendard', sans-serif;
    background: #f2f4f8;
}

.container {
    max-width: 420px;
    margin: 0 auto;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.profile {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 15px;
    border: 4px solid #eee;
}

.name {
    font-size: 24px;
    font-weight: bold;
}

.desc {
    color: #666;
    margin-bottom: 20px;
}

.btn {
    display: block;
    width: 80%;
    padding: 15px;
    margin-top: 15px auto;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-size: 18px;
}

.call { background: #ff6b6b; }
.sms { background: #4dabf7; }
.loc { background: #51cf66; }

.footer {
    margin-top: 20px;
    font-size: 13px;
    color: #aaa;
}
</style>

</head>

<body>

<div class="container">
<div class="card">

<img id="petImage" class="profile" src="https://via.placeholder.com/120">

<div id="petName" class="name">불러오는 중...</div>
<div id="message" class="desc">잠시만 기다려주세요</div>

<a id="callBtn" class="btn call">📞 전화하기</a>
<a id="smsBtn" class="btn sms">💬 문자하기</a>
<a href="#" onclick="sendLocation()" class="btn loc">📍 내 위치 보내기</a>

<div class="footer">QR 보호 서비스</div>

</div>
</div>


<script type="module">

// 🔥 Firebase SDK 불러오기
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase 설정 (여기에 본인 값 넣기)
const firebaseConfig = {
    apiKey: "AIzaSyAYlcl5hR_pN_qtv--0xTRS7QWDk7rfL30",
    authDomain: "finding-a-pet-a4259.firebaseapp.com",
    projectId: "finding-a-pet-a4259",
    storageBucket: "finding-a-pet-a4259.firebasestorage.app",
    messagingSenderId: "160399998653",
    appId: "1:160399998653:web:cfce5c2b1d2481c647c1d4",
    //measurementId: "G-KZBS2TJEK2" 
};

// 초기화
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// URL에서 ID 가져오기
const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get("id");

// 🔥 Firebase에서 데이터 가져오기
const docRef = doc(db, "pets", userId);
const docSnap = await getDoc(docRef);

let phoneNumber = "";

if (docSnap.exists()) {
    const data = docSnap.data();

    phoneNumber = data.phone;

    document.getElementById("petName").innerText = data.name;
    document.getElementById("message").innerText = "이 아이를 보호 중입니다";

    document.getElementById("callBtn").href = `tel:${data.phone}`;
    document.getElementById("smsBtn").href = `sms:${data.phone}`;

    if (data.image) {
        document.getElementById("petImage").src = data.image;
    }

} else {
    document.getElementById("petName").innerText = "정보 없음";
    document.getElementById("message").innerText = "등록되지 않은 QR입니다";
}


// 📍 위치 전송 (개선 버전)
window.sendLocation = function() {

    if (!phoneNumber) {
        alert("전화번호 정보 없음");
        return;
    }

    if (!navigator.geolocation) {
        alert("위치 기능 지원 안됨");
        return;
    }

    navigator.geolocation.getCurrentPosition(position => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        const mapLink = `https://maps.google.com/?q=${lat},${lng}`;

        window.location.href =
            `sms:${phoneNumber}?body=반려동물 발견 위치입니다 → ${mapLink}`;
    });
};

</script>

</body>
</html>
