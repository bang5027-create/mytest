<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반려동물 정보</title>

<style>
body {
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
    background: linear-gradient(180deg, #f5f5f7, #e5e7eb);
}

/* 중앙 */
.container {
    max-width: 420px;
    margin: 0 auto;
    padding: 30px 20px;
}

/* 카드 */
.card {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.7);
    border-radius: 28px;
    padding: 30px 20px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

/* 로딩 화면 */
.loader {
    text-align: center;
    padding: 80px 0;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #ddd;
    border-top: 4px solid #555;
    border-radius: 50%;
    margin: 0 auto 15px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* 등장 애니메이션 */
.fade-in {
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

/* 프로필 */
.profile {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    margin: 0 auto 20px;
    display: block;
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

/* 이름 */
.name {
    font-size: 26px;
    font-weight: 600;
}

/* 설명 */
.desc {
    color: #666;
    margin-bottom: 25px;
}

/* 버튼 */
.btn {
    display: block;
    width: 85%;
    max-width: 320px;
    padding: 16px;
    margin: 12px auto;
    border-radius: 14px;
    text-decoration: none;
    color: white;
    font-size: 17px;
    text-align: center;
    transition: 0.2s;
}

.btn:active {
    transform: scale(0.96);
}

.call { background: linear-gradient(135deg, #ff6b6b, #ff8787); }
.sms { background: linear-gradient(135deg, #4dabf7, #74c0fc); }
.loc { background: linear-gradient(135deg, #51cf66, #69db7c); }

.footer {
    margin-top: 25px;
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<!-- 🔥 로딩 화면 -->
<div id="loading" class="loader">
    <div class="spinner"></div>
    <div>정보 불러오는 중...</div>
</div>

<!-- 🔥 실제 콘텐츠 -->
<div id="content" style="display:none">

<img id="petImage" class="profile" src="https://via.placeholder.com/120">

<div id="petName" class="name">이름</div>
<div id="message" class="desc">설명</div>

<a id="callBtn" class="btn call">📞 전화하기</a>
<a id="smsBtn" class="btn sms">💬 문자하기</a>
<a href="#" onclick="sendLocation()" class="btn loc">📍 내 위치 보내기</a>

<div class="footer">QR 보호 서비스</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "여기에",
    authDomain: "여기에",
    projectId: "여기에",
    storageBucket: "여기에",
    messagingSenderId: "여기에",
    appId: "여기에"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get("id");

let phoneNumber = "";

const docRef = doc(db, "pets", userId);
const docSnap = await getDoc(docRef);

const loading = document.getElementById("loading");
const content = document.getElementById("content");

if (docSnap.exists()) {
    const data = docSnap.data();

    phoneNumber = data.phone;

    document.getElementById("petName").innerText = data.name;
    document.getElementById("message").innerText = "이 아이를 보호 중입니다";

    document.getElementById("callBtn").href = `tel:${data.phone}`;
    document.getElementById("smsBtn").href = `sms:${data.phone}`;

    if (data.image) {
        document.getElementById("petImage").src = data.image;
    }

} else {
    document.getElementById("petName").innerText = "정보 없음";
    document.getElementById("message").innerText = "등록되지 않은 QR입니다";
}

// 🔥 로딩 → 콘텐츠 전환
loading.style.display = "none";
content.style.display = "block";
content.classList.add("fade-in");


// 위치 전송
window.sendLocation = function() {

    if (!phoneNumber) {
        alert("전화번호 정보 없음");
        return;
    }

    navigator.geolocation.getCurrentPosition(position => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        const mapLink = `https://maps.google.com/?q=${lat},${lng}`;

        window.location.href =
            `sms:${phoneNumber}?body=반려동물 발견 위치 → ${mapLink}`;
    });
};

</script>
</body>
